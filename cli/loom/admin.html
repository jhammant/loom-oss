<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Loom — fleet console</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --warp:#101019;          /* deep indigo-black canvas */
  --warp-2:#15151f;
  --thread:#26263a;        /* woven line */
  --weft:#e8a33d;          /* amber accent thread */
  --weft-dim:#9a6e2c;
  --ink:#d9d7ce;
  --ink-dim:#7d7b8c;
  --ok:#76c893;
  --bad:#e26d5c;
  --warn:#e3c567;
  --mono:"IBM Plex Mono",ui-monospace,monospace;
  --disp:"Fraunces",serif;
}
*{box-sizing:border-box;margin:0}
html{color-scheme:dark}
body{
  background:
    repeating-linear-gradient(0deg,transparent 0 23px,rgba(255,255,255,.015) 23px 24px),
    repeating-linear-gradient(90deg,transparent 0 23px,rgba(255,255,255,.015) 23px 24px),
    radial-gradient(1200px 500px at 70% -10%,#1b1b2c 0%,var(--warp) 60%);
  color:var(--ink);font-family:var(--mono);font-size:13px;line-height:1.5;
  min-height:100vh;
}
a{color:var(--weft);text-decoration:none}
a:hover{text-decoration:underline}

header{
  display:flex;align-items:baseline;gap:1.2rem;
  padding:1.6rem 2rem .9rem;border-bottom:1px solid var(--thread);
}
.wordmark{font-family:var(--disp);font-size:2rem;font-weight:600;letter-spacing:.01em}
.wordmark em{color:var(--weft);font-style:italic;font-weight:500}
.statline{color:var(--ink-dim)}
.statline b{color:var(--ink);font-weight:500}
header .right{margin-left:auto;color:var(--ink-dim);font-size:12px}

/* the thread bar: each app woven as a coloured strand */
#threads{display:flex;height:7px;border-bottom:1px solid var(--thread)}
#threads span{
  flex:1;cursor:pointer;opacity:.85;
  transform-origin:left;animation:weave .5s cubic-bezier(.2,.9,.3,1) backwards;
}
#threads span:hover{opacity:1;box-shadow:0 0 8px currentColor}
@keyframes weave{from{transform:scaleX(0)}}

main{display:grid;grid-template-columns:minmax(0,1fr) 340px;gap:0;align-items:start}
@media (max-width:980px){main{grid-template-columns:1fr}}

section.fleet{padding:1.4rem 2rem}
h2{
  font-family:var(--disp);font-weight:500;font-size:1.05rem;color:var(--ink-dim);
  text-transform:lowercase;letter-spacing:.04em;margin-bottom:.9rem;
}
h2 b{color:var(--ink)}

table{width:100%;border-collapse:collapse}
th{
  text-align:left;color:var(--ink-dim);font-weight:500;font-size:11px;
  text-transform:uppercase;letter-spacing:.1em;
  padding:.35rem .6rem;border-bottom:1px solid var(--thread);
}
td{padding:.5rem .6rem;border-bottom:1px solid rgba(38,38,58,.55);vertical-align:top}
tbody tr{animation:rowin .35s ease backwards}
tbody tr:hover{background:rgba(232,163,61,.04);box-shadow:inset 2px 0 0 var(--weft)}
@keyframes rowin{from{opacity:0;transform:translateY(4px)}}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:.45rem;vertical-align:baseline}
.s-running .dot{background:var(--ok);box-shadow:0 0 6px var(--ok)}
.s-exited .dot,.s-stopped .dot{background:var(--warn)}
.s-missing .dot,.s-dead .dot{background:var(--bad)}
.s-unknown .dot{background:var(--ink-dim)}
.h-ok{color:var(--ok)} .h-down{color:var(--bad)} .h-unready{color:var(--warn)} .h-unknown{color:var(--ink-dim)}
.tag{
  display:inline-block;padding:0 .45em;border:1px solid var(--thread);border-radius:3px;
  color:var(--ink-dim);font-size:11px;
}
.tag.public{color:var(--weft);border-color:var(--weft-dim)}
.tag.gated{color:var(--warn);border-color:var(--warn)}
.urls{max-width:34ch;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

button{
  font:inherit;font-size:11.5px;color:var(--ink-dim);background:none;
  border:1px solid var(--thread);border-radius:4px;padding:.18rem .55rem;
  cursor:pointer;transition:all .15s;
}
button:hover{color:var(--ink);border-color:var(--ink-dim)}
button.primary{color:var(--warp);background:var(--weft);border-color:var(--weft);font-weight:600}
button.primary:hover{background:#f4b859}
button.danger:hover{color:var(--bad);border-color:var(--bad)}
button:disabled{opacity:.4;cursor:wait}
.actions{display:flex;gap:.35rem;justify-content:flex-end}

/* scanner rail */
aside{
  border-left:1px solid var(--thread);padding:1.4rem 1.4rem 2rem;min-height:80vh;
  background:linear-gradient(180deg,rgba(232,163,61,.025),transparent 240px);
}
aside .root{display:flex;gap:.4rem;margin-bottom:1rem}
aside .root input{
  flex:1;font:inherit;color:var(--ink);background:var(--warp-2);
  border:1px solid var(--thread);border-radius:4px;padding:.3rem .5rem;
}
.cand{
  border:1px solid var(--thread);border-radius:6px;padding:.6rem .7rem;margin-bottom:.6rem;
  background:rgba(21,21,31,.6);animation:rowin .35s ease backwards;
}
.cand .top{display:flex;align-items:baseline;gap:.5rem}
.cand .dirname{font-weight:600}
.cand .rt{margin-left:auto}
.cand .meta{color:var(--ink-dim);font-size:11.5px;margin:.15rem 0 .45rem}
.cand form{display:none;gap:.35rem;flex-wrap:wrap;margin:.5rem 0 .2rem}
.cand.open form{display:flex}
.cand input,.cand select{
  font:inherit;font-size:11.5px;color:var(--ink);background:var(--warp);
  border:1px solid var(--thread);border-radius:4px;padding:.2rem .4rem;
}
.cand input[name=name]{width:11ch}.cand input[name=port]{width:7ch}
.ready{color:var(--ok)}

/* logs drawer + toasts */
#drawer{
  position:fixed;inset:auto 0 0 0;max-height:45vh;background:var(--warp-2);
  border-top:2px solid var(--weft);padding:1rem 2rem;display:none;overflow:auto;
}
#drawer.open{display:block}
#drawer pre{font-size:11.5px;color:var(--ink);white-space:pre-wrap;word-break:break-all}
#drawer .bar{display:flex;gap:1rem;align-items:baseline;margin-bottom:.5rem}
#toasts{position:fixed;top:1rem;right:1rem;display:flex;flex-direction:column;gap:.5rem;z-index:9}
.toast{
  background:var(--warp-2);border:1px solid var(--thread);border-left:3px solid var(--weft);
  border-radius:4px;padding:.5rem .8rem;max-width:42ch;animation:rowin .25s ease;
}
.toast.err{border-left-color:var(--bad)}
.spin{display:inline-block;animation:sp 1s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.empty{color:var(--ink-dim);padding:2rem 0;font-style:italic;font-family:var(--disp)}
</style>
</head>
<body>
<header>
  <div class="wordmark">l<em>oo</em>m</div>
  <div class="statline" id="stats">…</div>
  <div class="right"><span id="ctx"></span> · <a href="#" onclick="showConfig();return false">config</a></div>
</header>
<div id="threads"></div>

<main>
  <section class="fleet">
    <h2>the <b>fleet</b></h2>
    <table id="fleet">
      <thead><tr>
        <th>app</th><th>status</th><th>health</th><th>url</th>
        <th>runtime</th><th>access</th><th></th>
      </tr></thead>
      <tbody></tbody>
    </table>
    <div class="empty" id="empty" hidden>nothing woven yet — pick something from the right rail.</div>
  </section>

  <aside>
    <h2>warp in <b>new apps</b></h2>
    <div class="root">
      <input id="root" value="" spellcheck="false">
      <button onclick="rescan()">scan</button>
    </div>
    <div class="root">
      <input id="giturl" placeholder="import: git URL or user/repo" spellcheck="false">
      <button onclick="importRepo(this)">clone</button>
    </div>
    <div id="cands"></div>
  </aside>
</main>

<div id="drawer">
  <div class="bar">
    <b id="drawer-title"></b>
    <a href="#" onclick="closeDrawer();return false">close ×</a>
  </div>
  <pre id="drawer-body"></pre>
</div>
<div id="toasts"></div>

<script>
const $=s=>document.querySelector(s);
const esc=t=>String(t??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
let FLEET=[];

function toast(msg,err=false){
  const d=document.createElement('div');
  d.className='toast'+(err?' err':'');d.textContent=msg;
  $('#toasts').appendChild(d);setTimeout(()=>d.remove(),err?9000:4500);
}
async function api(path,opts){
  const r=await fetch(path,opts);
  const j=await r.json().catch(()=>({}));
  if(!r.ok)throw new Error(j.error||r.statusText);
  return j;
}

async function refresh(){
  try{
    const d=await api('/api/fleet');
    FLEET=d.apps;
    const run=d.apps.filter(a=>a.status==='running').length;
    $('#stats').innerHTML=`<b>${d.apps.length}</b> apps · <b>${run}</b> running`;
    $('#ctx').textContent=`target ${d.target} · *.${d.base_domain}`+(d.public_domain?` · ${d.public_domain}`:'');
    const tb=$('#fleet tbody');tb.innerHTML='';
    $('#empty').hidden=d.apps.length>0;
    const th=$('#threads');th.innerHTML='';
    d.apps.forEach((a,i)=>{
      const col=a.status==='running'?'var(--ok)':(a.status==='missing'?'var(--bad)':'var(--warn)');
      const s=document.createElement('span');
      s.style.background=col;s.style.color=col;s.style.animationDelay=(i*60)+'ms';
      s.title=a.name;s.onclick=()=>showLogs(a.name);th.appendChild(s);
      const tr=document.createElement('tr');
      tr.style.animationDelay=(i*40)+'ms';
      tr.innerHTML=`
        <td><b>${esc(a.name)}</b></td>
        <td class="s-${esc(a.status)}"><span class="dot"></span>${esc(a.status)}</td>
        <td class="h-${esc(a.health)}">${esc(a.health)}</td>
        <td class="urls">
          ${a.url?`<a href="${esc(a.url)}" target="_blank">${esc(a.url.replace(/^https?:\/\//,''))}</a>`:'—'}
          ${a.public_url?`<br><a href="${esc(a.public_url)}" target="_blank">${esc(a.public_url.replace(/^https?:\/\//,''))}</a>`:''}
        </td>
        <td>${esc(a.runtime)}<span style="color:var(--ink-dim)"> @ ${esc(a.target)}</span></td>
        <td><span class="tag ${esc(a.access)}">${esc(a.access)}</span></td>
        <td class="actions">
          <button onclick="showLogs('${esc(a.name)}')">logs</button>
          ${a.status==='running'
            ?`<button onclick="act('stop','${esc(a.name)}',this)">stop</button>`
            :`<button onclick="act('start','${esc(a.name)}',this)">start</button>`}
          <button class="danger" onclick="removeApp('${esc(a.name)}',this)">remove</button>
        </td>`;
      tb.appendChild(tr);
    });
  }catch(e){toast('fleet: '+e.message,true)}
}

async function act(verb,name,btn){
  btn.disabled=true;btn.innerHTML='<span class="spin">◌</span>';
  try{await api('/api/'+verb,{method:'POST',body:JSON.stringify({name})});
      toast(`${verb}: ${name} ✓`);}
  catch(e){toast(`${verb} ${name}: ${e.message}`,true)}
  refresh();
}
async function removeApp(name,btn){
  if(!confirm(`Remove ${name} from the fleet? (container + route + index)`))return;
  act('remove',name,btn);
}

async function rescan(){
  const root=$('#root').value;
  $('#cands').innerHTML='<div class="empty">scanning…</div>';
  try{
    const d=await api('/api/scan?root='+encodeURIComponent(root));
    $('#root').value=d.root;
    const c=$('#cands');c.innerHTML='';
    if(!d.candidates.length)c.innerHTML='<div class="empty">nothing deployable found.</div>';
    d.candidates.forEach((x,i)=>{
      const div=document.createElement('div');
      div.className='cand';div.style.animationDelay=(i*35)+'ms';
      const state=x.deployed?'<span class="ready">in fleet ✓</span>'
                 :x.ready?'<span class="ready">manifest ready</span>'
                 :'no manifest — one click writes fleet.app.yaml';
      div.innerHTML=`
        <div class="top"><span class="dirname">${esc(x.dir)}</span>
          <span class="rt tag">${esc(x.runtime??'?')}</span></div>
        <div class="meta">${state}</div>
        ${x.deployed?'':x.ready
          ?`<button class="primary" onclick="deployReady('${esc(x.path)}',this)">deploy</button>`
          :`<button onclick="this.closest('.cand').classList.toggle('open')">configure + deploy</button>
            <form onsubmit="return deployNew(event,'${esc(x.path)}')">
              <input name="name" value="${esc(x.name)}" title="app name">
              <input name="port" value="${x.port??''}" placeholder="port" ${x.runtime==='static'?'disabled':''}>
              <select name="access"><option>private</option><option>public</option><option>gated</option></select>
              <button class="primary">weave it in</button>
              <input type="hidden" name="runtime" value="${esc(x.runtime)}">
            </form>`}`;
      c.appendChild(div);
    });
  }catch(e){$('#cands').innerHTML='';toast('scan: '+e.message,true)}
}

async function deployReady(path,btn){
  btn.disabled=true;btn.innerHTML='<span class="spin">◌</span> building…';
  try{
    const d=await api('/api/deploy',{method:'POST',body:JSON.stringify({path})});
    toast(`${d.name} is live → ${d.url}`);
  }catch(e){toast('deploy: '+e.message,true)}
  refresh();rescan();
}
function deployNew(ev,path){
  ev.preventDefault();
  const f=ev.target,btn=f.querySelector('.primary');
  btn.disabled=true;btn.innerHTML='<span class="spin">◌</span> building…';
  const m={name:f.name.value,runtime:f.runtime.value,access:f.access.value};
  if(f.port.value)m.port=+f.port.value;
  api('/api/deploy',{method:'POST',body:JSON.stringify({path,manifest:m})})
    .then(d=>toast(`${d.name} is live → ${d.url}`))
    .catch(e=>toast('deploy: '+e.message,true))
    .finally(()=>{refresh();rescan()});
  return false;
}

async function importRepo(btn){
  const url=$('#giturl').value.trim();
  if(!url)return;
  btn.disabled=true;btn.innerHTML='<span class="spin">◌</span>';
  try{
    const d=await api('/api/import',{method:'POST',
      body:JSON.stringify({url,root:$('#root').value})});
    toast(`cloned → ${d.path}`);$('#giturl').value='';
  }catch(e){toast('import: '+e.message,true)}
  btn.disabled=false;btn.textContent='clone';
  rescan();
}

async function showConfig(){
  $('#drawer-title').textContent='fleet config';
  $('#drawer-body').textContent='…';
  $('#drawer').classList.add('open');
  try{
    const d=await api('/api/config');
    const secrets=d.secret_names.length?d.secret_names.join(', '):'(none)';
    $('#drawer-body').textContent=
      `# ${d.config_file}   (edit there, then redeploy/restart as needed)\n`+
      `# secrets in ${d.secrets_file}: ${secrets}  (names only — values stay on disk)\n\n`+
      JSON.stringify(d.config,null,2);
  }catch(e){$('#drawer-body').textContent='config unavailable: '+e.message}
}

async function showLogs(name){
  $('#drawer-title').textContent=name;
  $('#drawer-body').textContent='…';
  $('#drawer').classList.add('open');
  try{const d=await api('/api/logs?app='+encodeURIComponent(name)+'&tail=300');
      $('#drawer-body').textContent=d.logs||'(no output)';}
  catch(e){$('#drawer-body').textContent='logs unavailable: '+e.message}
}
function closeDrawer(){$('#drawer').classList.remove('open')}

refresh();rescan();
setInterval(refresh,8000);
</script>
</body>
</html>
